name: First GitHub Actions Pipeline

on:
  push:
    branches:
      - main

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show Node Version
        run: node -v

      - name: Show NPM Version
        run: npm -v

      - name: Run Application
        run: node app.js